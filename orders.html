<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Moshke's Schnitzel</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="assets/logo.png" alt="Moshke's Schnitzel" />
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="menu.html" class="btn-order">Order Now</a></li>
    </ul>
    <div class="nav-icons">
      <a href="cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-count">0</span></a>
      <div id="auth-btn"></div>
    </div>
    <div class="hamburger"><i class="fas fa-bars"></i></div>
  </nav>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <h1>My Orders</h1>
    <p>Your order history</p>
  </section>

  <!-- ORDERS SECTION -->
  <section class="profile-section">
    <div class="container">
      <div class="orders-card">
        <h3>Order History</h3>
        <div id="my-orders-list">
          <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading orders...
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col">
          <img src="assets/logo.png" alt="Logo" class="footer-logo"/>
          <p id="footer-about">Cozy comfort food made with love.</p>
        </div>
        <div class="footer-col">
          <h4>Contact</h4>
          <p id="footer-phone"><i class="fas fa-phone"></i> Loading...</p>
          <p id="footer-email"><i class="fas fa-envelope"></i> Loading...</p>
          <p id="footer-whatsapp"><i class="fab fa-whatsapp"></i> Loading...</p>
          <p id="footer-address"><i class="fas fa-map-marker-alt"></i> Loading...</p>
        </div>
      </div>
      <p class="footer-bottom" id="footer-copyright">© 2025 Moshke's Schnitzel. All rights reserved.</p>
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/auth-ui.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/popup.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/orders.js"></script>

</body>
</html>
