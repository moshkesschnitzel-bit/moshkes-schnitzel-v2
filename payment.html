<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment — Moshke's Schnitzel</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="assets/logo.png" alt="Moshke's Schnitzel" />
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="menu.html" class="btn-order">Order Now</a></li>
    </ul>
  </nav>

  <!-- PAYMENT SECTION -->
  <section class="login-section">
    <div class="login-card" style="max-width:520px;">
      <img src="assets/logo.png" alt="Logo" class="login-logo" />
      <h2>Complete Payment</h2>

      <!-- ORDER SUMMARY -->
      <div class="payment-summary" id="payment-summary">
        <p>Loading order details...</p>
      </div>

      <!-- SPLIT PAYMENT -->
      <div id="split-payment-ui" style="display:none;">
        <div class="split-tabs">
          <button class="split-tab active" onclick="showSplitPart(1)">Person 1</button>
          <button class="split-tab" onclick="showSplitPart(2)">Person 2</button>
        </div>
        <p class="split-status" id="split-status-1">⏳ Waiting for payment...</p>
        <p class="split-status" id="split-status-2">⏳ Waiting for payment...</p>
      </div>

      <!-- PAYMENT FORM -->
      <div id="payment-form-container">
        <div id="card-element" class="card-element"></div>
        <div id="card-errors" class="error-msg" style="display:none;margin-top:10px;"></div>
        <button class="btn-primary-full" id="pay-btn" onclick="handlePayment()" style="margin-top:20px;">
          <i class="fas fa-lock"></i> Pay Now
        </button>
      </div>

      <p style="font-size:12px;color:#888;text-align:center;margin-top:15px;">
        <i class="fas fa-shield-alt"></i> Secured by Stripe
      </p>
    </div>
  </section>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="js/email.js"></script>
  <script src="js/payment.js"></script>

</body>
</html>
