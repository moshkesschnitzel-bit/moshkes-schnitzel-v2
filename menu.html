<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — Moshke's Schnitzel</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="menu-page">

  <!-- NAVBAR -->
  <nav class="navbar menu-navbar">
    <div class="nav-logo">
      <img src="assets/logo.png" alt="Moshke's Schnitzel" />
    </div>
    <div class="menu-title-nav">
      <h1>MOSHKE'S<br>SCHNITZEL</h1>
    </div>
    <div class="nav-icons">
      <a href="cart.html" class="cart-icon-menu">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count">0</span>
      </a>
      <div id="auth-btn"></div>
    </div>
    <div class="hamburger"><i class="fas fa-bars"></i></div>
  </nav>

  <!-- STORE CLOSED BANNER -->
  <div id="store-closed-banner" style="display:none;">
    <div class="closed-banner">
      <i class="fas fa-clock"></i> We are currently closed!
    </div>
  </div>

  <!-- MENU HEADER -->
  <div class="menu-header">
    <h2>Menu</h2>
  </div>

  <!-- CATEGORY SCROLL -->
  <div class="category-scroll-container">
    <div class="category-scroll" id="category-filters">
      <button class="category-pill active" onclick="filterCategory('all', this)">All</button>
    </div>
  </div>

  <!-- MENU GRID -->
  <section class="menu-section-new">
    <div class="menu-grid-new" id="menu-grid">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i> Loading menu...
      </div>
    </div>
  </section>

  <!-- ITEM MODAL -->
  <div class="modal-overlay" id="item-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <img id="modal-img" src="" alt="" />
      <div class="modal-info">
        <h2 id="modal-name"></h2>
        <p id="modal-desc"></p>
        <p class="modal-price">₪<span id="modal-price"></span></p>
        <div id="modal-extras" class="modal-extras"></div>
        <div id="modal-toppings" class="modal-toppings"></div>
        <div class="special-request">
          <label>Special Request:</label>
          <textarea id="modal-request" placeholder="Any special requests? (optional)"></textarea>
        </div>
        <div class="quantity-selector">
          <button onclick="changeQty(-1)">−</button>
          <span id="modal-qty">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-primary-full" onclick="addToCart()">
          Add to Cart — ₪<span id="modal-total"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth-ui.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/menu.js"></script>

</body>
</html>
