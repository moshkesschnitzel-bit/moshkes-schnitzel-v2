<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Moshke's Schnitzel</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="assets/logo.png" alt="Moshke's Schnitzel" />
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="menu.html" class="btn-order">Order Now</a></li>
    </ul>
    <div class="hamburger"><i class="fas fa-bars"></i></div>
  </nav>

  <!-- LOGIN SECTION -->
  <section class="login-section">
    <div class="login-card">
      <img src="assets/logo.png" alt="Logo" class="login-logo" />
      <h2>Welcome Back!</h2>
      <p class="login-subtitle">Sign in to order your favorite schnitzel 🍽️</p>

      <!-- ERROR MESSAGE -->
      <div id="error-msg" class="error-msg" style="display:none;"></div>

      <!-- GOOGLE SIGN IN -->
      <button class="btn-google" onclick="signInWithGoogle()">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <!-- EMAIL SIGN IN -->
      <div class="login-form">
        <input type="email" id="email" placeholder="Email address" />
        <input type="password" id="password" placeholder="Password" />
        <button class="btn-primary-full" onclick="signInWithEmail()">Sign In</button>
      </div>

      <div class="login-links">
        <a href="#" onclick="forgotPassword()">Forgot password?</a>
        <span>|</span>
        <a href="register.html">Create account</a>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer id="site-footer">
    <div class="container">
      <p class="footer-bottom" id="footer-copyright">© 2025 Moshke's Schnitzel. All rights reserved.</p>
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
